<svg xmlns="http://www.w3.org/2000/svg" width="420" height="96" viewBox="0 0 420 96" role="img" aria-labelledby="title desc">
  <title id="title">Compact Logo</title>
  <desc id="desc">Stacked compact panel icon with Compact wordmark</desc>
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2b6cb0"/>
      <stop offset="100%" stop-color="#35a07f"/>
    </linearGradient>
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#184f87"/>
      <stop offset="100%" stop-color="#2b6cb0"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#1a3f67" flood-opacity="0.25"/>
    </filter>
  </defs>

  <g transform="translate(8 8)" filter="url(#softShadow)">
    <rect x="0" y="0" width="80" height="80" rx="22" fill="url(#logoGradient)"/>
    <g transform="translate(10 14)">
      <g transform="rotate(-12 24 24)">
        <rect x="7" y="6" width="36" height="46" rx="4" fill="#ffffff" opacity="0.42"/>
        <rect x="13" y="10" width="36" height="46" rx="4" fill="#ffffff" opacity="0.62"/>
        <rect x="19" y="14" width="36" height="46" rx="4" fill="#ffffff"/>
      </g>
      <circle cx="27" cy="18" r="1.8" fill="#2b6cb0" opacity="0.55"/>
      <circle cx="33" cy="22" r="1.8" fill="#2b6cb0" opacity="0.45"/>
      <circle cx="39" cy="26" r="1.8" fill="#2b6cb0" opacity="0.35"/>
    </g>
  </g>

  <g transform="translate(104 22)">
    <text x="0" y="24" fill="url(#textGradient)" font-family="'Open Sans', 'Be Vietnam Pro', sans-serif" font-size="36" font-weight="800" letter-spacing="0.5">COMPACT</text>
    <text x="1" y="50" fill="#516173" font-family="'Open Sans', 'Be Vietnam Pro', sans-serif" font-size="12" font-weight="600" letter-spacing="2">SMART PARTITION SOLUTIONS</text>
  </g>
</svg>
